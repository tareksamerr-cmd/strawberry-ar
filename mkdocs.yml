site_name: Strawberry GraphQL بالعربي
site_url: https://tareksamerr-cmd.github.io/strawberry-ar/

theme:
  name: material
  language: ar
  direction: rtl
  palette:
    # إعدادات الوضع الفاتح (Light Mode)
    - scheme: default
      primary: pink
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: التبديل إلى الوضع الليلي
    # إعدادات الوضع الليلي (Dark Mode)
    - scheme: slate
      primary: pink
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: التبديل إلى الوضع الفاتح
  features:
    - navigation.tabs
    - content.code.copy

docs_dir: docs/ # المسار الذي يحتوي على ملفات الـ Markdown (.md)
