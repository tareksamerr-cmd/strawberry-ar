name: Deploy Arabic Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MkDocs Material
        run: |
          pip install mkdocs-material

      - name: Build and Deploy
        run: |
          # سيقوم باستخدام ملف mkdocs.yml الذي أنشأناه للتو
          mkdocs gh-deploy --force
