name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main # تأكد أن هذا هو اسم فرعك الرئيسي

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with docs

      - name: Build and Deploy
        run: |
          # هذا الأمر سيقوم ببناء التوثيق ورفعه لفرع gh-pages تلقائياً
          poetry run mkdocs gh-deploy --force
